<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Campus Gallery | St. Xavier School</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="header-placeholder"></div>

    <main class="container">
        <header class="page-title-section">
            <span class="eyebrow">Visual Journey</span>
            <h1>Life at St. Xavier's</h1>
        </header>

        <div class="gallery-filters">
            <button class="filter-btn active" data-filter="all">All</button>
            <button class="filter-btn" data-filter="campus">Campus</button>
            <button class="filter-btn" data-filter="events">Events</button>
            <button class="filter-btn" data-filter="sports">Sports</button>
        </div>

        <div class="gallery-grid">
            <div class="gallery-item campus">
                <img src="./image/Gemini_Generated_Image_ifas66ifas66ifas.png" alt="Library">
                <div class="overlay"><span>Hi-Tech Library</span></div>
            </div>
            <div class="gallery-item events">
                <img src="./image/Gemini_Generated_Image_ircz89ircz89ircz.png" alt="Graduation">
                <div class="overlay"><span>Annual Day</span></div>
            </div>
            <div class="gallery-item sports">
                <img src="./image/Gemini_Generated_Image_ircz89ircz89ircz.png" alt="Track">
                <div class="overlay"><span>Athletics Meet</span></div>
            </div>
            <div class="gallery-item campus">
                <img src="./image/Gemini_Generated_Image_ifas66ifas66ifas.png" alt="Lab">
                <div class="overlay"><span>Robotics Lab</span></div>
            </div>
             </div>
    </main>

    <div id="footer-placeholder"></div>
    <script src="script.js"></script>
</body>
</html>
